<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÓS</title>
</head>
<style>
    .container{
        overflow: hidden;
        width: 100%;
        background: #f4f4f4;
        padding: 20px 0;
    }

    .wrapper{
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: 16rem;
        gap: 2rem;
        animation: animate 15s linear infinite;
    }

    @keyframes animate {
        to{
            transform: translate(calc(-5 * (16rem - 1rem)));
        }
    }

    .wrapper img {
        width: 100%;        /* Faz a imagem ocupar toda a largura da coluna (16rem) */
        height: 16rem;      /* Define uma altura igual à largura para ser um quadrado */
        object-fit: cover;  /* O segredo: corta a imagem para caber sem deformar */
        border-radius: 10px; /* Opcional: deixa as pontas arredondadas */
        box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Opcional: dá uma profundidade */
    }
    .wrapper img {
        width: 100%;
        height: 16rem;
        object-fit: cover; 
        
        /* CENTRALIZAÇÃO */
        object-position: center; /* Tenta focar no meio exato */
        
        border-radius: 15px;
    }
</style>
<body>
    <main>
    <div class="container">
        <div class="wrapper">
            <img src="1.jpeg" alt="eu i ela">
            <img src="2.jpeg" alt="ela i eu">
            <img src="3.jpeg" alt="nós">
            <img src="5.jpeg" alt="amor">
            <img src="6.jpeg" alt="bê">
            <img src="7.jpeg" alt="hjsja">
            <img src="8.jpeg" alt="será">

            <img src="1.jpeg" area-hedden="true">
            <img src="2.jpeg" area-hedden="true">
            <img src="3.jpeg" area-hedden="true">
            <img src="4.jpeg" area-hedden="true">
            <img src="5.jpeg" area-hedden="true">
            <img src="6.jpeg" area-hedden="true">
            <img src="7.jpeg" area-hedden="true">
            <img src="8.jpeg" area-hedden="true">
        </div>
    </div>
    </main>

</body>
</html>
